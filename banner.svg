<svg viewBox="0 0 900 250" width="100%" height="250" xmlns="http://www.w3.org/2000/svg" style="background-color: #121212;">
  <style>
    .label {
      font-family: 'Google Sans', -apple-system, sans-serif;
      font-weight: bold;
      font-size: 18px;
      fill: #777;
    }
    .sublabel {
      font-family: 'Google Sans', -apple-system, sans-serif;
      font-size: 12px;
      fill: #777;
    }
    .code-line {
      stroke-linecap: round;
      stroke-width: 4;
    }
  </style>

  <defs>
    <pattern id="dotGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#4285F4" opacity="0.15" />
    </pattern>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F02222" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#F02222" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" fill="url(#dotGrid)" />

  <line x1="300" y1="20" x2="300" y2="230" stroke="#333" stroke-dasharray="4,4" />
  <line x1="600" y1="20" x2="600" y2="230" stroke="#333" stroke-dasharray="4,4" />

  <text x="150" y="210" class="label" text-anchor="middle">✨ Define</text>
  <text x="150" y="230" class="sublabel" text-anchor="middle">Custom Prompts</text>

  <text x="450" y="210" class="label" text-anchor="middle">⏱️ Schedule</text>
  <text x="450" y="230" class="sublabel" text-anchor="middle">Cloud Spanner &amp; Tasks</text>

  <text x="750" y="210" class="label" text-anchor="middle">⚡ Execute</text>
  <text x="750" y="230" class="sublabel" text-anchor="middle">Target Agent gRPC</text>

  <g transform="translate(80, 50)">
    
    <path d="M 20,0 C 20,15 5,20 -5,20 C 5,20 20,25 20,40 C 20,25 35,20 45,20 C 35,20 20,15 20,0 Z" fill="#F02222" opacity="0.8">
      <animate attributeName="opacity" values="0.4; 1; 0.4" dur="3s" repeatCount="indefinite" />
    </path>
    <path d="M 50,40 C 50,47 42,50 37,50 C 42,50 50,53 50,60 C 50,53 58,50 63,50 C 58,50 50,47 50,40 Z" fill="#4285F4" opacity="0.6">
      <animate attributeName="opacity" values="0.2; 0.8; 0.2" dur="2s" repeatCount="indefinite" />
    </path>

    <rect x="-15" y="30" width="150" height="55" rx="8" fill="none" stroke="#4285F4" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.3" />

    <line x1="5" y1="50" x2="5" y2="50" stroke="#ccc" class="code-line" opacity="0.9">
      <animate attributeName="x2" values="5; 90; 90; 5" dur="4s" repeatCount="indefinite" />
    </line>
    
    <line x1="15" y1="42" x2="15" y2="58" stroke="#fff" stroke-width="2" stroke-linecap="round">
      <animate attributeName="x1" values="15; 100; 100; 15" dur="4s" repeatCount="indefinite" />
      <animate attributeName="x2" values="15; 100; 100; 15" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite" />
    </line>

    <line x1="5" y1="68" x2="110" y2="68" stroke="#4285F4" class="code-line" opacity="0.4" />
  </g>

  <g transform="translate(450, 100)">
    <circle cx="0" cy="0" r="55" fill="none" stroke="#4285F4" stroke-width="1.5" stroke-dasharray="10 6" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite" />
    </circle>
    
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="12s" repeatCount="indefinite" />
      <circle cx="0" cy="0" r="40" fill="none" stroke="#fff" stroke-width="1" opacity="0.1" />
      <circle cx="40" cy="0" r="4" fill="#F02222" />
      <circle cx="-20" cy="34.6" r="3" fill="#4285F4" />
      <circle cx="-20" cy="-34.6" r="2" fill="#fff" />
    </g>

    <circle cx="0" cy="0" r="15" fill="#4285F4" opacity="0.2" />
    <circle cx="0" cy="0" r="4" fill="#4285F4" />
    <path d="M 0,0 L 0,-25" fill="none" stroke="#4285F4" stroke-width="2" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite" />
    </path>
  </g>

  <g transform="translate(750, 100)">
    <circle cx="0" cy="0" r="10" fill="url(#glow)">
      <animate attributeName="r" values="10; 60" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1; 0" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="10" fill="url(#glow)">
      <animate attributeName="r" values="10; 60" dur="2s" begin="1s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="1; 0" dur="2s" begin="1s" repeatCount="indefinite" />
    </circle>

    <polygon points="0,-15 15,0 0,15 -15,0" fill="#F02222" />
    
    <path d="M -40,-30 L -10,-10 M 40,-30 L 10,-10 M -40,30 L -10,10 M 40,30 L 10,10" fill="none" stroke="#4285F4" stroke-width="1.5" opacity="0.5" stroke-dasharray="2 2" />
    <circle cx="-40" cy="-30" r="2" fill="#fff" opacity="0.5"/>
    <circle cx="40" cy="-30" r="2" fill="#fff" opacity="0.5"/>
    <circle cx="-40" cy="30" r="2" fill="#fff" opacity="0.5"/>
    <circle cx="40" cy="30" r="2" fill="#fff" opacity="0.5"/>
  </g>

  <path id="flightPath" d="M 0,100 C 150,100 200,60 300,100 S 400,100 450,100 S 500,140 600,100 S 700,100 900,100" fill="none" stroke="#4285F4" stroke-width="1" opacity="0.2" />
  
  <circle r="4" fill="#fff">
    <animate attributeName="fill" 
             values="#ccc;#ccc;#4285F4;#4285F4;#F02222;#F02222" 
             keyTimes="0;0.333;0.334;0.666;0.667;1" 
             dur="7s" 
             repeatCount="indefinite" />
    <animateMotion dur="7s" repeatCount="indefinite">
      <mpath href="#flightPath"/>
    </animateMotion>
  </circle>

</svg>
